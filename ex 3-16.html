<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>시간 정보 입력 응용</title>
    <style>
        html, body{margin: 0; padding: 0; height: 100%;}
    </style>
</head>
<body>
    <h3>생일 축하 합니다.</h3>
    <hr>
    와타시의 생일은 4월 10일!
    <hr>
    <form>
        <table>
            <tr>
                <td>생일</td>
                <td><input type="date" value="2007-04-10"></td>
            </tr>
            <tr>
                <td>생일퐈리 시간</td>
                <td><input type="time"></td>
            </tr>
            <tr>
                <td>생일퐈리 장소</td>
                <td><input type="text"></td>
            </tr>
        </table>
    </form>
</body>
</html>
