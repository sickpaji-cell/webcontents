<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>&lt;style&gt;태그 사용 법</title>
    <style>
        div {
            display: inline-block;
            height: 50px;
            width: 50px;
            border: 1px solid sandybrown;
            text-align: center;
            color: antiquewhite;
            background-color: darkcyan;
        }
        #down:hover{
            position: relative;
            left: 20px;
            right: 20px;
            background: green;
        }
        #up:hover{
            position: relative;
            left: 20px;
            right: 20px;
            background: green;
        }
    </style>
</head>
<body>
    <h3>dls,dls,qmf,qmf</h3>
    <hr>
    <div>t</div>
    <div id="down">h</div>    
    <div>a</div>
    <div>n</div>
    <div id="up">k</div>
    <div>s</div>
</body>
</html>
