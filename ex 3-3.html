<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>details와summary태그</title>
    <style>
        html, body{margin: 0; padding: 0; height: 100%;}
    </style>
</head>
<body>
    <h3>details와summary태그</h3>
    Q &amp; A 리스트
    <details>
        <summary>Question 1</summary>
        <p>웹 개발자가 알아야 하는 언어 3 가지?</p>
    </details>
    <details>
        <summary>Answer 1</summary>
        <p>HTML 5,Css, Javascript</p>
    </details>
    <header></header> <!--머리말-->
    <nav></nav> <!--목차-->
    <section>
        <article></article><!--절-->
    </section> <!--본문-->
    <aside></aside> <!--노트 -->
    <footer></footer> <!--꼬리말-->
</body>
</html>
