<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>&lt;style&gt;태그 사용 법</title>
    <style>
       h3 { text-align: right;}
       span{ text-decoration: line-through;}
       strong {text-decoration: overline;}
       .p1 {text-indent: 3em; text-align: justify;}
       .p2 {text-indent: 1em; text-align: center;}
    </style>
</head>
<body>
    <h3>텍스트 꾸미기</h3>
    <hr>
    <p class="p1">HTML의 태그만으로 기존의 워드 프로세서와 같이 들여씌,정렬, 공백, 간격등과 새밀한 <span>택스트제아</span>를 할수 없다. </p>
    <p class="p2">그러나<strong>스타일 시트</strong>는 이를 가능케 ㄹ한다.  </p>
    <a href="http://naver.com" style="text-decoration: none;"></a>
</body>
</html>
