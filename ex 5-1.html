<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>&lt;style&gt;태그 사용 법</title>
    <style>
        div {
            border: 2px solid yellowgreen;
            color: crimson;
            background-color: aliceblue;
        }
        span {
            border: 3px dotted rebeccapurple;
            background-color: blanchedalmond;
        }
    </style>
</head>
<body>
    <h3>dls,dls,qmf,qmf</h3>
    <hr>
    나는 <div style="display: inline; visibility: hidden;">인간</div>입니다.<br>
    나는 <div style="display: inline;">인간</div>입니다.<br>
    나는 <div style="display: block;">인간</div>입니다.<br>
    나는 <div style="display: inline-block; height: 50px;">인간</div>입니다.
</body>
</html>
