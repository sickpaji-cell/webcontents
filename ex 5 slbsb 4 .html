<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>&lt;style&gt;태그 사용 법</title>
    <style>
        ul {
            background-image: url(https://img.freepik.com/free-vector/clean-black-world-map-silhouette-style-template-design_1017-46154.jpg?semt=ais_hybrid&w=740&q=80);
            list-style-type: square;
            list-style-position: outside;
            display: block;
            width: 100px;
        }
        ul li a {
            color: black;
            text-decoration: none;
        }
        ul li a:hover {
            background-color: yellowgreen;
        }
    </style>
</head>
<body>

    <ul>
        <li><a href="#">프랑스</a></li>
        <li><a href="#">독일</a></li>
        <li><a href="#">영국</a></li>
        <li><a href="#">노르웨이</a></li>
    </ul>
    
    
</body>
</html>
