<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>&lt;style&gt;태그 사용 법</title>
    <style>
       body {font-family: 'Times New Roman', serif; font-size: large;}
       h3{font: italic bold 40px consolas, sans-serif;}
    </style>
</head>
<body>
    <h3>모차</h3>
    <p style="font-weight: 900;">900</p>
    <p style="font-weight: 100;">100</p>
    <p style="font-style: italic;">900</p>
    <p style="font-style: oblique;">900</p>
    <span style="font-size: 1.5em;">1.5</span>
</body>
</html>
