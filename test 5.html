<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>형식을ㄹ 가진 텍스트 입력</title>
    <style>
        html, body{margin: 0; padding: 0; height: 100%;}
    </style>
</head>
<body>
    <h3>회원정보를 입력하세요/</h3>
    <hr>
    <form>
    <fieldset>
        <legend>도형서식 입력</legend>
        선종류 : <select name="death">
            <option value="1">선없음</option>
            <option value="2">실선</option>
            <option value="3">점선</option>
        </select>
        <br>
        선두께<input type="number" value="">
        선색<input type="color" value="#0000FF">
        <br>
        투명도(0~100)<input type="range" value="50">
    </fieldset>
    </form>
</body>
</html>
