<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>&lt;style&gt;태그 사용 법</title>
    <style>
        .alice{background-color: aliceblue; width: 100px; height: 50px;}
        .antique{background-color: aquamarine; width: 100px; height: 50px; }
        .aqua{background-color: aqua; width: 100px; height: 50px;}
        .emerald{background-color: greenyellow; width: 100px; height: 50px;}
        .dark{background-color: darkcyan; width: 100px; height: 50px;}
        .crimson{background-color: crimson; width: 100px; height: 50px;}
    </style>
</head>
<body>
    <table border="1">
    <thead>
        <h3>색 이ㅡㄻ과 코드</h3>
        <hr>
    </thead>
    <tbody>
        <td>이름</td>
        <td>코드</td>
        <td>색</td>
        <td>이름</td>
        <td>코드</td>
        <td>색</td>
        <tr>
            <td>aliceblue</td>
            <td>#F0F8FF</td>
            <td><div class="alice"></div></td>
            <td>aquamarine</td>
            <td>#7FFFD4</td>
            <td><div class="antique"> </div></td>
        </tr>
        <tr>
            <td>aqua</td>
            <td>#00FFFF</td>
            <td><div class="aqua"></div></td>
            <td>greenyellow</td>
            <td>#ADFF2F</td>
            <td><div class="emerald"></div></td>
        </tr>
        <tr>
            <td>darkcyon</td>
            <td>#008B8B</td>
            <td><div class="dark"></div></td>
            <td>crimson</td>
            <td>#DC143C</td>
            <td><div class="crimson"></div></td>
        </tr>
    </tbody>
    </table>
</body>
</html>
