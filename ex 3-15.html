<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>시간 정보를 입ㄹ겨하는 폼 활용</title>
    <style>
        html, body{margin: 0; padding: 0; height: 100%;}
    </style>
</head>
<body>
    <h3>시간정보 입력 html요소들</h3>
    <form>
        <pre>
            month:<input type="month" value="2022-3">
            date:<input type="date" value="2022-3">
            time:<input type="time" value="2022-3">
            week:<input type="week" value="2022-3">
            local:<input type="datetime-local" value="2022-3">
        </pre>
    </form>
</body>
</html>
