<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>&lt;style&gt;태그 사용 법</title>
    <style>
        div { position: absolute;}
        img {position: absolute;}
        #spadeA{z-index: -3; left: 10px; top: 20px;}
        #spade2{z-index: 2; left: 40px; top: 30px;}
        #spade3{z-index: 3; left: 80px; top: 40px;}
        #spade4{z-index: 7; left: 120px; top: 50px;}
    </style>
</head>
<body>
    <h3>dls,dls,qmf,qmf</h3>
    <hr>
    <div>
        <img id="spadeA" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/01_of_spades_A.svg/250px-01_of_spades_A.svg.png" width="100" height="140" alt="스A">
        <img id="spade2" src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Playing_card_spade_2.svg/960px-Playing_card_spade_2.svg.png" width="100" height="140" alt="스2">
        <img id="spade3" src="https://previews.123rf.com/images/pandawild/pandawild1509/pandawild150900136/45128584-poker-playing-card-3-spade.jpg" width="100" height="140" alt="스3">
        <img id="spade4" src="https://previews.123rf.com/images/pandawild/pandawild1509/pandawild150900121/45128569-poker-playing-card-4-spade.jpg" width="100" height="140" alt="스4">
    </div>
</body>
</html>
