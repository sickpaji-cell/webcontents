<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>&lt;style&gt;태그 사용 법</title>
    <style>
        #menubar{
            background: olivedrab;
            width: 100px;
        
        }
        #menubar ul{
            margin: 0;
            padding: 0;
            width: 56;
        }
        #menubar ul li{
            display: block;
            list-style-type: none;
            padding: 0px 15px;
        }
        #menubar ul li a{
            color: antiquewhite;
            text-decoration: none;
        }
        #menubar ul li a:hover{
            color: violet;
        }
    </style>
</head>
<body>
    <nav id="menubar">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Espresso</a></li>
            <li><a href="#">Capuccino</a></li>
            <li><a href="#">Cafe Latte</a></li>
            <li><a href="#">F.A.Q</a></li>
        </ul>
    </nav>
    
    
</body>
</html>
