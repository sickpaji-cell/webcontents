<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>웹 프로그래밍 개요</title>
    <style>
        html, body{margin: 0; padding: 0; height: 100%;}
    </style>
</head>
<body>
    <h3>웹 프로그래밍 개요</h3>
    <details>
        <summary>웹의 기본 목적</summary>
        <p>웹의 기본 목적은 한 컴푸터에서 만든 문서(document)를 다른 컴퓨터에서 수;\ㅣㅂ게 볼 수 있도록 하는 것이다</p>
    </details>
    <details>
        <summary>왜 Wed인가?</summary>
        <p>전 세계의 컴퓨터들을 인터넷으로 거미줄처럼 연결하고 웹 문서를 쉽게 주고 받을 수 있도록 시스템을 만들고 WWW(World Wide Web), 간단히 줄여 웹(Web)이라고 부른다.</p>
    </details>
    <details>
        <summary>웹 페이지를 구성하는 3 요소</summary>
        <ul>
            <li>HTML - 문서의 구조와 내용</li>
            <li>CSS-문서의 모양</li>
            <li>JavaScript-행동 및 응용 프로그램</li>
        </ul>
    </details>



    <header></header> <!--머리말-->
    <nav></nav> <!--목차-->
    <section>
        <article></article><!--절-->
    </section> <!--본문-->
    <aside></aside> <!--노트 -->
    <footer></footer> <!--꼬리말-->
</body>
</html>
