<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>버튼이 있는 입력 폼</title>
    <style>
        html, body{margin: 0; padding: 0; height: 100%;}
    </style>
</head>
<body>
    <h3>만들자 만들자 버튼을 만들자~</h3>
    <hr>
    <form>
        검색:<input type="text" size="10" value="">
        <input type="button" value="Q">
        <button type="button">Q2</button><br>
        submit 버튼:<input type="submit" value="전송1">
        <button type="button">전송2</button><br>
        reset 버튼:<input type="reset" value="reset1">
        <button type="button">reset2</button><br>
        이미지 버튼:<input type="image" src="media/apple.jpg" alt="image">
        <button type="button"><img src="media/apple.jpg"></button><br>
    </form>
</body>
</html>
